<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verification Result</title>

<style>
body {font-family: Arial; background:#f2f5f8; margin:0;}

.topbar {
  background:#003366;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container {
  max-width:600px;
  margin:50px auto;
}

.card {
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

.status {
  background:#e6f4ea;
  color:#2e7d32;
  padding:5px 10px;
  border-radius:6px;
}

.btn {
  background:#003366;
  color:white;
  padding:10px 15px;
  display:inline-block;
  margin-top:15px;
  text-decoration:none;
}

iframe {width:100%; height:350px; margin-top:20px;}
</style>

<script>
function generateID(){
  return "GOV-" + Math.floor(Math.random()*1000000);
}
</script>

</head>

<body onload="document.getElementById('vid').innerText = generateID();">

<div class="topbar">
  <div>Document Verification</div>
  <div>gov.gr</div>
</div>

<div class="container">
  <div class="card">

    <h2>Verification Successful</h2>
    <span class="status">Verified</span>

    <p id="vid"></p>

    <a href="certificate.pdf" class="btn" download>Download PDF</a>

    <iframe src="certificate.pdf"></iframe>

  </div>
</div>

</body>
</html>
