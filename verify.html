<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification Result</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f2f5f8;
}

/* TOP BAR */
.topbar {
  background: #003366;
  color: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 30px;
}

/* CARD */
.container {
  max-width: 650px;
  margin: 60px auto;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  text-align: center;
}

.status {
  background: #e6f4ea;
  color: #2e7d32;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
}

/* ID BOX */
.id-box {
  background: #f4f6f9;
  padding: 10px;
  border-radius: 6px;
  margin-top: 15px;
  font-size: 13px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 20px;
  background: #003366;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

/* PDF PREVIEW */
.preview {
  margin-top: 25px;
}

iframe {
  width: 100%;
  height: 400px;
  border: 1px solid #ddd;
}

/* QR */
.qr img {
  width: 100px;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="topbar">
  <h3>Document Verification</h3>
  <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Govgr_logo.svg" class="logo">
</div>

<div class="container">
  <div class="card">

    <h2>Verification Successful</h2>
    <span class="status">Verified</span>

    <div class="id-box">
      Verification ID: GOV-2026-847392
    </div>

    <a href="certificate.pdf" class="btn" download>Download PDF</a>

    <!-- PDF PREVIEW -->
    <div class="preview">
      <h4>Preview</h4>
      <iframe src="certificate.pdf"></iframe>
    </div>

    <!-- QR -->
    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://dilosiservicesgovgr.services">
    </div>

  </div>
</div>

</body>
</html>
