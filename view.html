<!DOCTYPE html>
<html>
<head>
<title>Document Verification</title>
<link rel="stylesheet" href="style.css">

<style>
.page {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

.title {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
}

.section {
  display: flex;
  justify-content: space-between;
}

.left { width: 60%; }
.right { width: 30%; }

.row {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
  padding: 8px 0;
  font-size: 14px;
}

.label { font-weight: 600; color: #333; }
.value { color: #555; }

.qrbox {
  text-align: center;
}

.qrbox img {
  width: 150px;
  border: 4px solid black;
  padding: 5px;
}

.small-title {
  font-weight: 600;
  margin-top: 20px;
}

.storage-btn {
  background: #1e7d4f;
  color: white;
  padding: 10px 20px;
  border-radius: 4px;
  margin-top: 10px;
  display: inline-block;
  text-decoration: none;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="images/logo.svg">
    <h1>govgr Document Verification</h1>
  </div>
</div>

<div class="page">

  <p><a href="index.html">← Back</a></p>

  <h2>Digital Document Certificate</h2>
  <div class="title">View</div>

  <div class="section">
    <div class="left" id="dataBox"></div>
    <div class="right" id="qrBox"></div>
  </div>

</div>

<!-- DATA -->
<script src="data.js"></script>

<script>
// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const user = users[id];

const dataBox = document.getElementById("dataBox");
const qrBox = document.getElementById("qrBox");

if (user) {

  // LEFT SIDE (FULL DATA)
  dataBox.innerHTML = `
    <div class="small-title">Signatory's Details</div>

    <div class="row"><span class="label">Name</span><span class="value">${user.name || "-"}</span></div>
    <div class="row"><span class="label">Surname</span><span class="value">${user.surname || "-"}</span></div>
    <div class="row"><span class="label">Father's Name</span><span class="value">${user.father || "-"}</span></div>
    <div class="row"><span class="label">Mother's Name</span><span class="value">${user.mother || "-"}</span></div>
    <div class="row"><span class="label">Tax Number</span><span class="value">${user.tax || "-"}</span></div>
    <div class="row"><span class="label">Date of Birth</span><span class="value">${user.dob || "-"}</span></div>

    <div class="small-title">Signature details</div>
    <div class="row"><span class="label">Date of Signature</span><span class="value">${user.signatureDate || "-"}</span></div>
    <div class="row"><span class="label">Issue Date</span><span class="value">${user.issueDate || "-"}</span></div>
  `;

  // UNIQUE QR LINK
  const uniqueLink = window.location.origin + window.location.pathname + "?id=" + user.id;

  // RIGHT SIDE
  qrBox.innerHTML = `
    <div class="qrbox">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${uniqueLink}">
    </div>

    <div class="small-title">Verification code</div>
    <p>${user.verificationCode || user.id}</p>

    <div class="small-title">Status</div>
    <p>${user.status || "The document was issued"}</p>

    <div class="small-title">Standard</div>
    <p>${user.standard || "GNISIO-YP0GRAFIS"}</p>

    <div class="small-title">Document issue date</div>
    <p>${user.issueDate || "-"}</p>

    <div class="small-title">Save to your archive</div>
    <button class="storage-btn" onclick="downloadFile('${user.certificate}')">
      Storage
    </button>
  `;

} else {
  dataBox.innerHTML = `<p style="color:red;">Invalid Record</p>`;
}

// SMART DOWNLOAD FUNCTION
  function downloadFile(file) {
  fetch(file, { method: 'HEAD' })
    .then(response => {
      if (response.ok) {
        window.location.href = file;
      } else {
        alert("❌ File not found for this user");
      }
    })
    .catch(() => {
      alert("❌ File not found for this user");
    });
}
</script>

</body>
</html>
