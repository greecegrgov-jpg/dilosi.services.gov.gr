<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Government Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
    }

    /* Header */
    .header {
      background: #0b3c5d;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: 600;
    }

    /* Container */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      color: #555;
    }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #0b3c5d;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
    }

    .btn:hover {
      background: #092c45;
    }

    /* QR Code */
    .qr {
      margin-top: 25px;
    }

    .qr img {
      width: 120px;
      height: 120px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="header">
    Government Digital Services
  </div>

  <div class="container">
    <div class="card">
      <h2>Online Verification Service</h2>
      <p>Click below to continue your request securely.</p>

      <a href="#" class="btn">Start Service</a>

      <div class="qr">
        <p>Scan QR Code</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://yourdomain.com">
      </div>
    </div>

    <div class="footer">
      © 2026 Digital Government Services
    </div>
  </div>

</body>
</html>
