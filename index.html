<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f2f5f8;
}

/* TOP BAR */
.topbar {
  background: #003366;
  color: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar h1 {
  font-size: 16px;
  margin: 0;
}

.logo {
  height: 30px;
}

/* MAIN CARD */
.container {
  max-width: 600px;
  margin: 60px auto;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  text-align: center;
}

.card h2 {
  margin-bottom: 10px;
}

.card p {
  color: #555;
  font-size: 14px;
}

/* STATUS */
.status {
  display: inline-block;
  background: #e6f4ea;
  color: #2e7d32;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 10px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 20px;
  background: #003366;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
}

.btn:hover {
  background: #002244;
}

/* QR */
.qr {
  margin-top: 25px;
}

.qr img {
  width: 110px;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>Document Verification</h1>
  <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Govgr_logo.svg" class="logo">
</div>

<!-- MAIN -->
<div class="container">
  <div class="card">
    <h2>Verification Successful</h2>
    <p>Your document has been verified successfully.</p>

    <span class="status">Verified</span><br>

    <a href="certificate.pdf" class="btn" download>Download PDF</a>

    <div class="qr">
      <p>Scan to verify</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=https://dilosiservicesgovgr.services">
    </div>
  </div>

  <div class="footer">
    © 2026 Digital Government Services
  </div>
</div>

</body>
</html>
